name: Block Unwanted Dependencies

on:
  pull_request:
    paths:
      - 'package*.json'
      - 'yarn.lock'

jobs:
  check-dependencies:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Check for unwanted dependencies
        run: |
          echo "Checking for unwanted npm dependencies..."
          
          # List of unwanted dependencies with exact versions
          UNWANTED_DEPS=(
            "chalk@5.6.1"
            "debug@4.4.2"
            "ansi-styles@6.2.2"
            "supports-color@10.2.1"
            "strip-ansi@7.1.1"
            "ansi-regex@6.2.1"
            "wrap-ansi@9.0.1"
            "color-convert@3.1.1"
            "color-name@2.0.1"
            "is-arrayish@0.3.3"
            "slice-ansi@7.1.1"
            "color@5.0.1"
            "color-string@2.1.1"
            "simple-swizzle@0.2.3"
            "supports-hyperlinks@4.1.1"
            "has-ansi@6.0.1"
            "chalk-template@1.1.1"
            "backslash@0.2.1"
          )
          
          # Files to check
          FILES_TO_CHECK=()
          if [ -f "package.json" ]; then
            FILES_TO_CHECK+=("package.json")
          fi
          if [ -f "package-lock.json" ]; then
            FILES_TO_CHECK+=("package-lock.json")
          fi
          if [ -f "yarn.lock" ]; then
            FILES_TO_CHECK+=("yarn.lock")
          fi
          
          if [ ${#FILES_TO_CHECK[@]} -eq 0 ]; then
            echo "No package files found to check"
            exit 0
          fi
          
          FOUND_UNWANTED=false
          
          # Check each file for unwanted dependencies
          for file in "${FILES_TO_CHECK[@]}"; do
            echo "Checking $file..."
            
            for dep in "${UNWANTED_DEPS[@]}"; do
              # Split dependency name and version
              dep_name=$(echo "$dep" | cut -d'@' -f1)
              dep_version=$(echo "$dep" | cut -d'@' -f2)
              
              # Search for the exact version number in the file
              # This will catch the version regardless of the exact format
              if grep -q "$dep_version" "$file"; then
                # Additional check to see if this version is associated with the package name
                # by looking for the package name in nearby context
                if grep -B2 -A2 "$dep_version" "$file" | grep -q "$dep_name" || \
                   grep -B5 -A5 "$dep_name" "$file" | grep -q "$dep_version"; then
                  echo "❌ FOUND UNWANTED DEPENDENCY: $dep in $file"
                  echo "Matching context:"
                  grep -B2 -A2 "$dep_version" "$file" | grep --color=never -E "$dep_name|$dep_version" || true
                  FOUND_UNWANTED=true
                fi
              fi
            done
          done
          
          if [ "$FOUND_UNWANTED" = true ]; then
            echo ""
            echo "🚫 Workflow failed: Unwanted dependencies detected!"
            echo "Please remove the above dependencies before merging."
            exit 1
          else
            echo "✅ No unwanted dependencies found"
          fi