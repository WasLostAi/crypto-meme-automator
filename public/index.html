<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Meme Automator</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f0f0f0; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { color: #333; text-align: center; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
        input, select { padding: 8px; margin: 5px; border: 1px solid #ccc; border-radius: 3px; }
        .result { margin-top: 10px; padding: 10px; background: #f8f9fa; border-radius: 3px; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Crypto Meme Automator</h1>

        <div class="section">
            <h2>Generate & Deploy Meme Token</h2>
            <button onclick="generateAndDeploy()">Generate & Deploy to All Chains</button>
            <div id="deployResult" class="result"></div>
        </div>

        <div class="section">
            <h2>Check Balance</h2>
            <select id="balanceChain">
                <option value="ethereum">Ethereum</option>
                <option value="polygon">Polygon</option>
                <option value="bsc">BSC</option>
                <option value="solana">Solana</option>
            </select>
            <input type="text" id="balanceAddress" placeholder="Wallet Address" />
            <button onclick="checkBalance()">Check Balance</button>
            <div id="balanceResult" class="result"></div>
        </div>

        <div class="section">
            <h2>Transfer Tokens</h2>
            <select id="transferChain">
                <option value="ethereum">Ethereum</option>
                <option value="polygon">Polygon</option>
                <option value="bsc">BSC</option>
                <option value="solana">Solana</option>
            </select>
            <input type="text" id="fromPrivateKey" placeholder="From Private Key" />
            <input type="text" id="toAddress" placeholder="To Address" />
            <input type="text" id="amount" placeholder="Amount" />
            <button onclick="transferTokens()">Transfer</button>
            <div id="transferResult" class="result"></div>
        </div>

        <div class="section">
            <h2>NFT Metadata</h2>
            <select id="nftChain">
                <option value="ethereum">Ethereum</option>
                <option value="polygon">Polygon</option>
                <option value="bsc">BSC</option>
                <option value="solana">Solana</option>
            </select>
            <input type="text" id="contractAddress" placeholder="Contract Address" />
            <input type="text" id="tokenId" placeholder="Token ID" />
            <button onclick="getNFTMetadata()">Get Metadata</button>
            <div id="nftResult" class="result"></div>
        </div>
    </div>

    <script>
        const BASE_URL = 'http://localhost:3000';

        async function generateAndDeploy() {
            const resultDiv = document.getElementById('deployResult');
            resultDiv.innerHTML = 'Generating and deploying...';

            try {
                const response = await fetch(`${BASE_URL}/generate-and-deploy`, { method: 'POST' });
                const data = await response.json();
                resultDiv.innerHTML = `<div class="success">${JSON.stringify(data, null, 2)}</div>`;
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }

        async function checkBalance() {
            const chain = document.getElementById('balanceChain').value;
            const address = document.getElementById('balanceAddress').value;
            const resultDiv = document.getElementById('balanceResult');

            if (!address) {
                resultDiv.innerHTML = '<div class="error">Please enter an address</div>';
                return;
            }

            resultDiv.innerHTML = 'Checking balance...';

            try {
                const response = await fetch(`${BASE_URL}/balance/${chain}/${address}`);
                const data = await response.json();
                resultDiv.innerHTML = `<div class="success">Balance: ${JSON.stringify(data)}</div>`;
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }

        async function transferTokens() {
            const chain = document.getElementById('transferChain').value;
            const fromPrivateKey = document.getElementById('fromPrivateKey').value;
            const to = document.getElementById('toAddress').value;
            const amount = document.getElementById('amount').value;
            const resultDiv = document.getElementById('transferResult');

            if (!fromPrivateKey || !to || !amount) {
                resultDiv.innerHTML = '<div class="error">Please fill all fields</div>';
                return;
            }

            resultDiv.innerHTML = 'Transferring...';

            try {
                const response = await fetch(`${BASE_URL}/transfer`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chain, fromPrivateKey, to, amount })
                });
                const data = await response.json();
                resultDiv.innerHTML = `<div class="success">${JSON.stringify(data)}</div>`;
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }

        async function getNFTMetadata() {
            const chain = document.getElementById('nftChain').value;
            const contract = document.getElementById('contractAddress').value;
            const id = document.getElementById('tokenId').value;
            const resultDiv = document.getElementById('nftResult');

            if (!contract || !id) {
                resultDiv.innerHTML = '<div class="error">Please fill all fields</div>';
                return;
            }

            resultDiv.innerHTML = 'Fetching metadata...';

            try {
                const response = await fetch(`${BASE_URL}/nft/${chain}/${contract}/${id}/metadata`);
                const data = await response.json();
                resultDiv.innerHTML = `<div class="success">${JSON.stringify(data, null, 2)}</div>`;
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
